<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SILVER KISS — Бижута от сребро 925</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Michroma&family=Cormorant+Garamond:ital,wght@0,500;1,500;1,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
<script src="content.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="hero.jsx" data-presets="react"></script>
<script type="text/babel" src="sections.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
  const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (REDUCED) document.documentElement.classList.add('reduced');
  if (window.gsap && window.ScrollTrigger) gsap.registerPlugin(ScrollTrigger);

  function App() {
    React.useEffect(() => {
      if (REDUCED) return;
      // generic reveal-on-scroll for every [data-reveal]
      const els = gsap.utils.toArray('[data-reveal]');
      const tweens = els.map((el) =>
        gsap.fromTo(el, { opacity: 0, y: 42 }, {
          opacity: 1, y: 0, duration: 1, ease: 'power3.out',
          scrollTrigger: { trigger: el, start: 'top 88%' },
        })
      );
      const id = setTimeout(() => ScrollTrigger.refresh(), 120);
      return () => { clearTimeout(id); tweens.forEach((t) => { t.scrollTrigger && t.scrollTrigger.kill(); t.kill(); }); };
    }, []);

    return (
      <React.Fragment>
        <Header />
        <Hero />
        <Sections />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
